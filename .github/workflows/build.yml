name: Lint and Test

on:
  push:
  pull_request:
  schedule:
    - cron: '19 2 * * *'

jobs:
  build:
    permissions:
      actions: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python_version: [3.13]
        os: [ubuntu-latest, macOS-latest, windows-latest]
      fail-fast: false
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false
    - name: Setup headless display  # installs libraries necessary to run a Qt desktop environment on linux runners
      uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0
      with:
        qt: true
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version:  ${{ matrix.python_version }}
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip virtualenv
        python -m virtualenv pyenv

        if [ "${{ runner.os }}" = "Windows" ]; then
          source pyenv/Scripts/activate
        else
          source pyenv/bin/activate
        fi

        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Lint & Test
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          source pyenv/Scripts/activate
        else
          source pyenv/bin/activate
        fi
        pre-commit run --all-files