name: Lint and Test

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '19 2 * * *'

jobs:
  build:
    permissions:
      actions: write
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        python_version: [ 3.13 ]
        os: [ ubuntu-latest, macOS-latest, windows-latest ]
      fail-fast: false

    steps:
      - name: Setup checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup headless Qt  # installs libraries necessary to run a Qt desktop environment on linux runners
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0
        with:
          qt: true

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version:  ${{ matrix.python_version }}

      - name: Setup python venv
        shell: bash
        run: |
          python -m pip install --upgrade pip virtualenv
          python -m virtualenv pyenv

      - name: Install python deps
        shell: bash
        run: |

          if [ "${{ runner.os }}" = "Windows" ]; then
            source pyenv/Scripts/activate
          else
            source pyenv/bin/activate
          fi

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install spaCy models
        shell: bash
        run: |

          if [ "${{ runner.os }}" = "Windows" ]; then
            source pyenv/Scripts/activate
          else
            source pyenv/bin/activate
          fi

          ./setup-spacy-models.sh

      - name: Install CAMeL packages (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |

          if [ "${{ runner.os }}" = "Windows" ]; then
            source pyenv/Scripts/activate
          else
            source pyenv/bin/activate
          fi

          ./setup-camel-packages.sh

      - name: Run pre-commit (misc checks & core tests)
        shell: bash
        run: |

          if [ "${{ runner.os }}" = "Windows" ]; then
            source pyenv/Scripts/activate
          else
            source pyenv/bin/activate
          fi

          pre-commit run --all-files

      - name: Run full test suite (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |

          if [ "${{ runner.os }}" = "Windows" ]; then
            source pyenv/Scripts/activate
          else
            source pyenv/bin/activate
          fi

          pytest

      - name: Run full test suite (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |

          if [ "${{ runner.os }}" = "Windows" ]; then
            source pyenv/Scripts/activate
          else
            source pyenv/bin/activate
          fi

          pytest -m "not camel"
